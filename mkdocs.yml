site_name: Paretech Docs
site_url: https://docs.paretech.com
use_directory_urls: true
use_directory_urls: true
theme:
  name: material
  logo: assets/paretech_logo.png
  features:
    - navigation.tabs
    - content.code.copy
extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
markdown_extensions:
  - admonition
  - pymdownx.saneheaders
  - mdx_truly_sane_lists:
      nested_indent: 2
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
